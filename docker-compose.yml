version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6378:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      DATA_DIR: ${DATA_DIR}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      REDIS_URL: ${REDIS_URL}
      SECRET_KEY: ${SECRET_KEY}
      DATA_DIR: ${DATA_DIR}
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    ports:
      - "8081:8080"
    volumes:
      - ./data:/data
    environment:
      TITILER_API_DISABLE_STAC: "TRUE"
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "8889:80"
    depends_on:
      - backend
    restart: unless-stopped
